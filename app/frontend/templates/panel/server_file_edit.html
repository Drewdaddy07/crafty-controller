{% extends ../blank_base.html %} {% block meta %} {% end %} {% block title %}Crafty
Controller - <span id="fileTitle"></span>{%
end %} {% block content %}

<link href="/static/assets/css/partial/crafty-editor.css" rel="stylesheet">

<div class="content-wrapper">
    <!-- Page Title Header Starts-->
    <div class="row page-title-header">
        <div class="col-12">
            <div class="page-header">
                <h4 class="page-title">
                    <span class="badge-pill badge-outline-primary"><i class="fa-solid fa-server"></i>&nbsp;&nbsp;<span
                            id="server-name-nav"></span></span><br>
                    <small>UUID: <span id="server_uuid"></span> </small>
                </h4>
            </div>
        </div>
    </div>
    <!-- Page Title Header Ends-->
    <div id="editor_container" class="col-sm-12">
        <div class="editorManager">
            <h2 id="fileError"></h2>
            <div id="editorParent"><span class="badge badge-outline-info"><i
                        class="fa-solid fa-file-export"></i>&nbsp;&nbsp;<span id="editingFile"></span></span>&nbsp;<div
                    class="gear-menu">
                    <i class="fa-solid fa-gear context-icon"></i>
                </div>
                <div id="editor" onresize="editor.resize()" style="resize: both; width: 100%">
                </div>
                <br />
            </div>
            <h3 id="file_warn" data-leave='{{translate("serverFilesEditor", "unsavedChanges" , data["lang"])}}'></h3>
            <div id="save-container" class="align-items-center text-center">
                <button id="saveButton" class="btn btn-outline-success"
                    data-saved='{{translate("serverFilesEditor", "saved" , data["lang"])}}'
                    data-changes='{{translate("serverFilesEditor", "save" , data["lang"])}}' onclick="save()">
                    <i class="fas fa-save"></i>&nbsp;&nbsp;<span id="saveButtonText"></span>
                </button>
            </div>
        </div>
    </div>
    {% include parts/context_menu.html %}
    <script src="/static/assets/vendors/ace-builds/src-min/ace.js" type="text/javascript" charset="utf-8"></script>
    <script src="/static/assets/js/shared/editor.js"></script>
    {% end %}
